---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: superset-mcp-with-selenium

resources:
  - ../../base

patches:
  - path: deployment-patch.yaml
  - target:
      kind: HorizontalPodAutoscaler
      name: superset-mcp-hpa
    patch: |-
      - op: replace
        path: /spec/maxReplicas
        value: 4

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/instance: superset-mcp-with-selenium
      app.kubernetes.io/environment: with-selenium

commonAnnotations:
  app.kubernetes.io/variant: "with-selenium"
  app.kubernetes.io/screenshots: "enabled"

replicas:
  - name: superset-mcp
    count: 2
