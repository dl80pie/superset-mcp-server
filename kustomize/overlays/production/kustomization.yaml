---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: superset-mcp-production

resources:
  - ../../base
  - networkpolicy.yaml

patches:
  - path: deployment-patch.yaml
  - target:
      kind: HorizontalPodAutoscaler
      name: superset-mcp-hpa
    patch: |-
      - op: replace
        path: /spec/maxReplicas
        value: 6
  - target:
      kind: Secret
      name: superset-mcp-config
    patch: |-
      - op: add
        path: /stringData/MCP_JWT_PUBLIC_KEY
        value: "-----BEGIN PUBLIC KEY-----\nMIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA...\n-----END PUBLIC KEY-----"
      - op: add
        path: /stringData/MCP_AUTH_ENABLED
        value: "true"
      - op: add
        path: /stringData/MCP_AUDIT_ENABLED
        value: "true"

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/instance: superset-mcp-production
      app.kubernetes.io/environment: production
      app.kubernetes.io/security-level: "hardened"

commonAnnotations:
  app.kubernetes.io/variant: "production"
  app.kubernetes.io/screenshots: "enabled"
  app.kubernetes.io/monitoring: "prometheus"
  app.kubernetes.io/security: "hardened"

replicas:
  - name: superset-mcp
    count: 3

secretGenerator:
  - name: superset-mcp-secrets
    literals:
      - SUPERSET_PASSWORD="your-production-password"
      - SECRET_KEY="your-production-secret-key"
    options:
      annotations:
        kubernetes.io/secret-type: "production"
