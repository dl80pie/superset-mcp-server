---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: superset-mcp-minimal

bases:
  - ../../base

patchesStrategicMerge:
  - deployment-patch.yaml

commonLabels:
  app.kubernetes.io/instance: superset-mcp-minimal
  app.kubernetes.io/environment: minimal

commonAnnotations:
  app.kubernetes.io/variant: "minimal"
  app.kubernetes.io/screenshots: "disabled"

replicas:
  - name: superset-mcp
    count: 3

patches:
  - target:
      kind: HorizontalPodAutoscaler
      name: superset-mcp-hpa
    patch: |-
      - op: replace
        path: /spec/maxReplicas
        value: 8
