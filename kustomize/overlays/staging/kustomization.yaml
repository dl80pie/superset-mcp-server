---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: superset-mcp-staging

bases:
  - ../../base

patchesStrategicMerge:
  - deployment-patch.yaml

commonLabels:
  app.kubernetes.io/instance: superset-mcp-staging
  app.kubernetes.io/environment: staging

commonAnnotations:
  app.kubernetes.io/variant: "staging"
  app.kubernetes.io/screenshots: "enabled"
  app.kubernetes.io/monitoring: "prometheus"

replicas:
  - name: superset-mcp
    count: 2

patches:
  - target:
      kind: HorizontalPodAutoscaler
      name: superset-mcp-hpa
    patch: |-
      - op: replace
        path: /spec/maxReplicas
        value: 4
