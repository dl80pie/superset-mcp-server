---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: superset-mcp
spec:
  template:
    spec:
      containers:
        - name: mcp-service
          env:
            - name: WEBDRIVER_TYPE
              value: "chrome"
            - name: MCP_SCREENSHOTS_ENABLED
              value: "true"
            - name: MCP_LOG_LEVEL
              value: "DEBUG"
            - name: FLASK_ENV
              value: "development"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            initialDelaySeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            initialDelaySeconds: 15
            timeoutSeconds: 5
