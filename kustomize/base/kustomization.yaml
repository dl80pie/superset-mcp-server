---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: superset-mcp-base

resources:
  - deployment.yaml
  - service.yaml
  - route.yaml
  - hpa.yaml
  - secret.yaml

commonLabels:
  app.kubernetes.io/name: superset-mcp
  app.kubernetes.io/component: mcp-service
  app.kubernetes.io/managed-by: kustomize

commonAnnotations:
  app.kubernetes.io/version: "1.0.0"
  app.kubernetes.io/created-by: "superset-mcp-kustomize"

images:
  - name: superset-mcp
    newTag: "latest"

replicas:
  - name: superset-mcp
    count: 2
