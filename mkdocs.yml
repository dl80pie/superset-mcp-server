---
site_name: Superset MCP Service
site_description: Apache Superset MCP Service Documentation
site_author: Your Team
site_url: https://your-group.gitlab.io/superset-mcp

# Repository
repo_name: your-group/superset-mcp
repo_url: https://gitlab.example.com/your-group/superset-mcp
edit_uri: edit/main/docs/

# Theme
theme:
  name: material
  language: de
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.highlight
    - search.share
    - header.autohide
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
  palette:
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  logo: assets/logo.png
  favicon: assets/favicon.png

# Plugins
plugins:
  - search:
      lang: de
  - git-revision-date-localized:
      type: datetime
      timezone: Europe/Berlin
      locale: de
  - glightbox
  - minify:
      minify_html: true

# Navigation
nav:
  - Home:
    - index.md
    - changelog.md
  - Installation:
    - installation/index.md
    - installation/requirements.md
    - installation/docker.md
    - installation/openshift.md
    - installation/air-gapped.md
  - Configuration:
    - configuration/index.md
    - configuration/environment.md
    - configuration/secrets.md
    - configuration/monitoring.md
  - Deployment:
    - deployment/index.md
    - deployment/kustomize.md
    - deployment/gitlab-ci.md
    - deployment/environments.md
  - Integration:
    - integration/index.md
    - integration/librechat.md
    - integration/claude.md
    - integration/api.md
  - API Reference:
    - api/index.md
    - api/tools.md
    - api/schemas.md
    - api/examples.md
  - Development:
    - development/index.md
    - development/setup.md
    - development/testing.md
    - development/contributing.md
  - Operations:
    - operations/index.md
    - operations/monitoring.md
    - operations/troubleshooting.md
    - operations/security.md

# Markdown Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html
  - toc:
      permalink: true
      title: Inhaltsverzeichnis
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: pymdownx.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: your-group
      repo: superset-mcp
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Extra CSS und JS
extra_css:
  - assets/extra.css

extra_javascript:
  - assets/extra.js

# Extra Daten
extra:
  analytics:
    provider: google
    property: !ENV GOOGLE_ANALYTICS_KEY
  social:
    - icon: fontawesome/brands/gitlab
      link: https://gitlab.example.com/your-group/superset-mcp
    - icon: fontawesome/brands/docker
      link: https://gitlab.example.com/your-group/superset-mcp/container_registry
  version:
    provider: mike
    default: stable

# Copyright
copyright: |
  &copy; 2024 Your Team -
  <a href="#__consent">Cookie-Einstellungen</a>

# Page Tree
page_tree:
  - section: index
  - title: Inhaltsverzeichnis
  - children:
      - section
      - page
