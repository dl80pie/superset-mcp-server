---
# OpenShift Deployment for Superset MCP Service with Selenium Support
apiVersion: apps/v1
kind: Deployment
metadata:
  name: superset-mcp
  labels:
    app: superset-mcp
    component: mcp-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: superset-mcp
  template:
    metadata:
      labels:
        app: superset-mcp
        component: mcp-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: mcp-service
          image: superset-mcp:latest
          imagePullPolicy: Always
          ports:
            - name: mcp
              containerPort: 5008
              protocol: TCP
          env:
            - name: FLASK_APP
              value: superset
            - name: PYTHONPATH
              value: /app
            - name: MCP_DEV_USERNAME
              valueFrom:
                secretKeyRef:
                  name: superset-mcp-config
                  key: MCP_DEV_USERNAME
            - name: SUPERSET_WEBSERVER_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: superset-mcp-config
                  key: SUPERSET_WEBSERVER_ADDRESS
            - name: DATABASE_URI
              valueFrom:
                secretKeyRef:
                  name: superset-mcp-config
                  key: DATABASE_URI
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: superset-mcp-config
                  key: SECRET_KEY
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: superset-mcp-config
                  key: REDIS_URL
            # Selenium/WebDriver Configuration
            - name: WEBDRIVER_TYPE
              value: "chrome"
            - name: WEBDRIVER_BASEURL
              valueFrom:
                secretKeyRef:
                  name: superset-mcp-config
                  key: WEBDRIVER_BASEURL
            - name: WEBDRIVER_OPTION_ARGS
              value: "--headless,--no-sandbox,--disable-dev-shm-usage,--disable-gpu"
          resources:
            requests:
              cpu: 500m      # Increased for Selenium
              memory: 1Gi    # Increased for Chrome + WebDriver
            limits:
              cpu: 2000m     # Increased for screenshot generation
              memory: 2Gi    # Increased for Chrome browser instances
          livenessProbe:
            httpGet:
              path: /health
              port: 5008
            initialDelaySeconds: 45  # Increased for Chrome startup
            timeoutSeconds: 15
            failureThreshold: 3
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 5008
            initialDelaySeconds: 30  # Increased for Chrome startup
            timeoutSeconds: 10
            failureThreshold: 3
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
            - name: dev-shm
              mountPath: /dev/shm
      volumes:
        - name: tmp-volume
          emptyDir: {}
        - name: dev-shm
          emptyDir:
            medium: Memory
---
apiVersion: v1
kind: Service
metadata:
  name: superset-mcp
  labels:
    app: superset-mcp
spec:
  type: ClusterIP
  ports:
    - port: 5008
      targetPort: 5008
      protocol: TCP
      name: mcp
  selector:
    app: superset-mcp
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: superset-mcp
spec:
  to:
    kind: Service
    name: superset-mcp
  port:
    targetPort: 5008
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: superset-mcp-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: superset-mcp
  minReplicas: 2
  maxReplicas: 4  # Reduced due to higher memory usage
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
