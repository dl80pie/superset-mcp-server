---
# OpenShift Secret for Superset MCP Service Configuration
apiVersion: v1
kind: Secret
metadata:
  name: superset-mcp-config
  type: Opaque
stringData:
  # MCP Service Configuration
  MCP_DEV_USERNAME: "admin"  # Override with your admin username
  
  # Superset Configuration
  SUPERSET_WEBSERVER_ADDRESS: "http://superset-service:8088"
  
  # Database Configuration (replace with your actual database URI)
  DATABASE_URI: "postgresql://superset:password@postgresql-service:5432/superset"
  
  # Security Configuration
  SECRET_KEY: "your-secret-key-here-change-in-production"
  
  # Redis Configuration (for caching and sessions)
  REDIS_URL: "redis://redis-service:6379/0"
  
  # Selenium/WebDriver Configuration
  WEBDRIVER_BASEURL: "http://superset-service:8088/"
  
  # Optional: JWT Configuration for production
  # MCP_JWT_PUBLIC_KEY: "-----BEGIN PUBLIC KEY-----\nyour-public-key-here\n-----END PUBLIC KEY-----"
